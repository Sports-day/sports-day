name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sports-day/sports-day

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-admin:
    name: Build Admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/admin
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_AUTHORITY=${{ vars.VITE_AUTHORITY }}
            VITE_CLIENT_ID=${{ vars.VITE_CLIENT_ID }}
            VITE_REDIRECT_URI=${{ vars.VITE_ADMIN_REDIRECT_URI }}
            VITE_SILENT_REDIRECT_URI=${{ vars.VITE_ADMIN_SILENT_REDIRECT_URI }}
            VITE_SCOPE=${{ vars.VITE_SCOPE }}
            VITE_GRAPHQL_ENDPOINT=${{ vars.VITE_GRAPHQL_ENDPOINT }}
            VITE_PANEL_URL=${{ vars.VITE_PANEL_URL }}

  build-panel:
    name: Build Panel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/panel
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_AUTHORITY=${{ vars.VITE_AUTHORITY }}
            VITE_CLIENT_ID=${{ vars.VITE_CLIENT_ID }}
            VITE_REDIRECT_URI=${{ vars.VITE_PANEL_REDIRECT_URI }}
            VITE_SILENT_REDIRECT_URI=${{ vars.VITE_PANEL_SILENT_REDIRECT_URI }}
            VITE_SCOPE=${{ vars.VITE_SCOPE }}
            VITE_OIDC_DISPLAY_NAME=${{ vars.VITE_OIDC_DISPLAY_NAME }}
            VITE_GA_ID=${{ vars.VITE_GA_ID }}
            VITE_GRAPHQL_ENDPOINT=${{ vars.VITE_GRAPHQL_ENDPOINT }}

  build-form:
    name: Build Form
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/form
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/form/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_AUTHORITY=${{ vars.VITE_AUTHORITY }}
            VITE_CLIENT_ID=${{ vars.VITE_CLIENT_ID }}
            VITE_REDIRECT_URI=${{ vars.VITE_FORM_REDIRECT_URI }}
            VITE_SILENT_REDIRECT_URI=${{ vars.VITE_FORM_SILENT_REDIRECT_URI }}
            VITE_SCOPE=${{ vars.VITE_SCOPE }}
            VITE_GRAPHQL_ENDPOINT=${{ vars.VITE_GRAPHQL_ENDPOINT }}
