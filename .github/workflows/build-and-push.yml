name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sports-day/sports-day

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      admin: ${{ steps.filter.outputs.admin }}
      panel: ${{ steps.filter.outputs.panel }}
      form: ${{ steps.filter.outputs.form }}
      is_tag: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          filters: |
            api:
              - 'api/**'
              - 'go.mod'
              - 'go.sum'
              - 'gqlgen.yml'
              - 'docker/api.Dockerfile'
            admin:
              - 'apps/admin/**'
              - 'package.json'
              - 'yarn.lock'
            panel:
              - 'apps/panel/**'
              - 'package.json'
              - 'yarn.lock'
            form:
              - 'apps/form/**'
              - 'package.json'
              - 'yarn.lock'

  build-api:
    name: Build API
    needs: changes
    if: ${{ needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-admin:
    name: Build Admin
    needs: changes
    if: ${{ needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.admin == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/admin
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_AUTHORITY=${{ vars.VITE_AUTHORITY }}
            VITE_CLIENT_ID=${{ vars.VITE_CLIENT_ID }}
            VITE_REDIRECT_URI=${{ vars.VITE_ADMIN_REDIRECT_URI }}
            VITE_SILENT_REDIRECT_URI=${{ vars.VITE_ADMIN_SILENT_REDIRECT_URI }}
            VITE_SCOPE=${{ vars.VITE_SCOPE }}
            VITE_GRAPHQL_ENDPOINT=${{ vars.VITE_GRAPHQL_ENDPOINT }}
            VITE_PANEL_URL=${{ vars.VITE_PANEL_URL }}

  build-panel:
    name: Build Panel
    needs: changes
    if: ${{ needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.panel == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/panel
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_AUTHORITY=${{ vars.VITE_AUTHORITY }}
            VITE_CLIENT_ID=${{ vars.VITE_CLIENT_ID }}
            VITE_REDIRECT_URI=${{ vars.VITE_PANEL_REDIRECT_URI }}
            VITE_SILENT_REDIRECT_URI=${{ vars.VITE_PANEL_SILENT_REDIRECT_URI }}
            VITE_SCOPE=${{ vars.VITE_SCOPE }}
            VITE_OIDC_DISPLAY_NAME=${{ vars.VITE_OIDC_DISPLAY_NAME }}
            VITE_GA_ID=${{ vars.VITE_GA_ID }}
            VITE_GRAPHQL_ENDPOINT=${{ vars.VITE_GRAPHQL_ENDPOINT }}

  build-form:
    name: Build Form
    needs: changes
    if: ${{ needs.changes.outputs.is_tag == 'true' || needs.changes.outputs.form == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/form
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/form/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_AUTHORITY=${{ vars.VITE_AUTHORITY }}
            VITE_CLIENT_ID=${{ vars.VITE_CLIENT_ID }}
            VITE_REDIRECT_URI=${{ vars.VITE_FORM_REDIRECT_URI }}
            VITE_SILENT_REDIRECT_URI=${{ vars.VITE_FORM_SILENT_REDIRECT_URI }}
            VITE_SCOPE=${{ vars.VITE_SCOPE }}
            VITE_GRAPHQL_ENDPOINT=${{ vars.VITE_GRAPHQL_ENDPOINT }}
