# ================================================================
# Grafana Loki 設定ファイル（シングルノード構成）
#
# Docker Compose 本番環境用。
# ストレージはローカルファイルシステム（DATA_DIR/loki）を使用する。
# ================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

# ─── 共通設定（ingesterとストレージの共有設定）────────────────────
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# ─── スキーマ設定 ─────────────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ─── Ingester設定 ─────────────────────────────────────────────────
ingester:
  chunk_idle_period: 1h
  max_chunk_age: 2h
  chunk_retain_period: 30s

# ─── 制限設定 ─────────────────────────────────────────────────────
limits_config:
  # ログの保持期間（90日）
  # compactor.retention_enabled: true と合わせて機能する
  retention_period: 2160h

  # 古いサンプルを拒否（クライアントの時刻ズレ対策）
  reject_old_samples: true
  reject_old_samples_max_age: 168h

  # 取り込みレート制限
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

  # クエリ制限
  max_query_length: 720h
  max_entries_limit_per_query: 50000

# ─── コンパクター設定（古いログの自動削除）────────────────────────
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  # retention_enabled を true にすることで limits_config.retention_period が有効になる
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# ─── クエリキャッシュ ─────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 256
        ttl: 24h
  cache_results: true

# ─── フロントエンド設定 ───────────────────────────────────────────
frontend:
  log_queries_longer_than: 5s
  compress_responses: true
