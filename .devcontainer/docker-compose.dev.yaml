services:
  app:
    image: mcr.microsoft.com/devcontainers/base:jammy
    init: true
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
  mysql:
    image: mysql:8
    container_name: sports-day-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sportsday
    volumes:
      - mysql_data:/var/lib/mysql
  rustfs:
    image: rustfs/rustfs
    ports:
      - "9000:9000"
    environment:
      ACCESS_KEY: admin
      SECRET_KEY: password
    volumes:
      - rustfs_data:/data

volumes:
  mysql_data:
  rustfs_data:
