services:
  app:
    image: mcr.microsoft.com/devcontainers/base:jammy
    init: true
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
      - claude_data:/home/vscode/.claude
      - codex_data:/home/vscode/.codex
  mysql:
    image: mysql:8
    container_name: sports-day-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sportsday
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
  claude_data:
  codex_data:
