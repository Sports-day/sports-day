services:
  # ─── MySQL ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sportsday}
      MYSQL_USER: ${MYSQL_USER:-sportsday}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/mysql:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    ports:
      - "3306:3306"

  # ─── RustFS (S3-compatible storage) ─────────────────
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      RUSTFS_ROOT_USER: ${STORAGE_ACCESS_KEY}
      RUSTFS_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - ${DATA_DIR:-./data}/rustfs:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    ports:
      - "9001:9001"

  # ─── Go API server ──────────────────────────────────
  api:
    image: ghcr.io/sports-day/sports-day/api:main
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      RDB_ADDRESS: mysql:3306
      RDB_USER: ${MYSQL_USER:-sportsday}
      RDB_PASS: ${MYSQL_PASSWORD}
      RDB_NAME: ${MYSQL_DATABASE:-sportsday}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_CORS_ORIGINS: ${CORS_ORIGINS}
      AUTH_ISSUER_URL: ${AUTH_ISSUER_URL}
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID}
      AUTH_ROLE_CACHE_TTL: ${AUTH_ROLE_CACHE_TTL:-60}
      STORAGE_ENDPOINT: http://rustfs:9000
      STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-sportsday}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_WEBHOOK_SECRET: ${STORAGE_WEBHOOK_SECRET}
      DEBUG: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend
      - frontend

  # ─── Panel (/) ──────────────────────────────────────
  panel:
    image: ghcr.io/sports-day/sports-day/panel:main
    build:
      context: .
      dockerfile: apps/panel/Dockerfile
      args:
        VITE_BASE_PATH: /
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/api/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend

  # ─── Admin (/admin/) ────────────────────────────────
  admin:
    image: ghcr.io/sports-day/sports-day/admin:main
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_BASE_PATH: /admin/
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/api/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend

  # ─── Form (/form/) ─────────────────────────────────
  form:
    image: ghcr.io/sports-day/sports-day/form:main
    build:
      context: .
      dockerfile: apps/form/Dockerfile
      args:
        VITE_BASE_PATH: /form/
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:8080/api/healthz || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend

  # ─── Nginx (HTTPS termination + routing) ────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
    depends_on:
      api:
        condition: service_healthy
      panel:
        condition: service_healthy
      admin:
        condition: service_healthy
      form:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DATA_DIR:-./data}/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend
      - backend

  # ─── Loki (ログストレージ) ────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ${DATA_DIR:-./data}/loki:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  # ─── Alloy (ログ収集エージェント) ─────────────────────
  # Docker コンテナの stdout を収集して Loki に転送する。
  # /var/run/docker.sock のマウントが必要。
  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - backend

  # ─── Grafana (可視化・分析ダッシュボード) ──────────────
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # セキュリティ: Grafana を外部から直接アクセスさせる場合はドメインを設定
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${DATA_DIR:-./data}/grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
